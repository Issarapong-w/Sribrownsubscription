<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRI BROWN - B2B Coffee System</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700;900&display=swap');
    body { font-family: 'Noto Sans Thai', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    .animate-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#FAF9F6] text-[#3C2A21]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, createElement, useMemo } = React;

    // *** แก้ไขตรงนี้: วาง URL ที่ได้จากขั้นตอน Deploy Web App ของ Google Apps Script ***
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxiYklDyRfQ5nmnuOMzLixh2iov86x09HognZw_x2a-6hZmeRdGV4Dr8zshKm6J_k096g/exec"; 

    // --- ฟังก์ชันช่วยจัดการตัวเลขให้ปลอดภัย ---
    const safeNum = (val) => {
      if (val === null || val === undefined || val === "") return 0;
      if (typeof val === 'number') return val;
      const clean = String(val).replace(/,/g, '').replace(/[^\d.-]/g, '');
      const n = parseFloat(clean);
      return isNaN(n) ? 0 : n;
    };

    const Icon = ({ name, size = 24, className = "" }) => {
      try {
        if (typeof lucide === 'undefined' || !lucide.icons) return null;
        const iconKey = name.charAt(0).toLowerCase() + name.slice(1);
        const iconData = lucide.icons[name] || lucide.icons[iconKey] || lucide.icons.coffee;
        return (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {iconData.map(([tag, attrs], i) => createElement(tag, { ...attrs, key: i }))}
          </svg>
        );
      } catch (e) { return null; }
    };

    function App() {
      const [view, setView] = useState('landing');
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(false);
      const [allPartners, setAllPartners] = useState([]);
      const [allWithdrawals, setAllWithdrawals] = useState([]);
      const [userWithdrawals, setUserWithdrawals] = useState([]);
      const [adminTab, setAdminTab] = useState('overview');

      // API Call Function
      const callGAS = async (action, args = [], callback) => {
        if (!GAS_WEBAPP_URL) return console.warn("Missing GAS URL");
        setLoading(true);
        try {
          const url = `${GAS_WEBAPP_URL}?action=${action}&args=${encodeURIComponent(JSON.stringify(args))}`;
          const res = await fetch(url);
          const result = await res.json();
          if (callback) callback(result.data);
        } catch (e) {
          console.error("API Error:", e);
        } finally {
          setLoading(false);
        }
      };

      const handleLogin = (e) => {
        e.preventDefault();
        const email = e.target.elements.email.value;
        const pass = e.target.elements.password.value;
        callGAS('checkLogin', [email, pass], (res) => {
          if (res) { setUser(res); setView('landing'); }
          else alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง");
        });
      };

      const remainingAllocation = useMemo(() => {
        if (!user) return 0;
        const totalUsed = (Array.isArray(userWithdrawals) ? userWithdrawals : []).reduce((s, i) => s + safeNum(i.amount), 0);
        return Math.max(0, safeNum(user.total_allocation) - totalUsed);
      }, [user, userWithdrawals]);

      useEffect(() => {
        if (view === 'admin') {
          callGAS('getAllPartners', [], setAllPartners);
          callGAS('getAllWithdrawals', [], setAllWithdrawals);
        }
        if (view === 'dashboard' && user) {
          callGAS('getWithdrawals', [user.email], setUserWithdrawals);
        }
      }, [view, user]);

      const Navbar = () => (
        <nav className="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
          <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('landing')}>
            <div className="bg-[#3C2A21] p-2 rounded-lg text-white"><Icon name="Coffee" size={20}/></div>
            <span className="font-black text-lg tracking-tighter italic text-[#3C2A21]">SRI BROWN</span>
          </div>
          <div className="flex gap-4 items-center">
            {user ? (
              <>
                <button onClick={() => setView(user.role === 'admin' ? 'admin' : 'dashboard')} className="text-[10px] font-bold uppercase border px-4 py-2 rounded-full hover:bg-gray-50 transition-all">
                  {user.role === 'admin' ? "Admin" : "Dashboard"}
                </button>
                <button onClick={() => {setUser(null); setView('landing');}} className="text-gray-400 hover:text-red-500"><Icon name="LogOut" size={18}/></button>
              </>
            ) : (
              <button onClick={() => setView('login')} className="text-xs font-bold bg-[#3C2A21] text-white px-6 py-2 rounded-full shadow-lg">Login</button>
            )}
          </div>
        </nav>
      );

      return (
        <div className="min-h-screen">
          <Navbar />
          {loading && <div className="fixed top-0 left-0 w-full h-1 bg-gray-100 z-[100]"><div className="h-full bg-[#3C2A21] w-1/4 animate-pulse" /></div>}

          {/* Landing View */}
          {view === 'landing' && (
            <div className="pt-24 pb-20 text-center animate-in">
              <h1 className="text-6xl font-black text-[#3C2A21] uppercase italic tracking-tighter mb-4">Sri Brown B2B</h1>
              <p className="text-[#D4A373] font-bold uppercase tracking-widest opacity-60">Coffee Roastery Subscription</p>
            </div>
          )}

          {/* Login View */}
          {view === 'login' && (
            <div className="max-w-md mx-auto my-20 p-10 bg-white rounded-3xl shadow-xl border animate-in">
              <h2 className="text-2xl font-black text-center mb-8 italic uppercase">Partner Login</h2>
              <form onSubmit={handleLogin} className="space-y-4">
                <input name="email" type="email" required placeholder="Email" className="w-full p-4 border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm" />
                <input name="password" type="password" required placeholder="Password" className="w-full p-4 border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm" />
                <button type="submit" className="w-full py-4 bg-[#3C2A21] text-white rounded-2xl font-black uppercase shadow-lg hover:bg-black transition-all">Sign In</button>
              </form>
            </div>
          )}

          {/* Admin View (แก้ไขการ Render ให้ปลอดภัยขึ้น) */}
          {view === 'admin' && user?.role === 'admin' && (
            <div className="max-w-7xl mx-auto px-6 py-12 animate-in text-left">
              <div className="flex justify-between items-end mb-10 border-b pb-6">
                <h2 className="text-4xl font-black text-[#3C2A21] uppercase italic tracking-tighter">Admin Console</h2>
                <div className="flex bg-gray-100 p-1 rounded-xl">
                  {['overview', 'partners', 'withdrawals'].map(t => (
                    <button key={t} onClick={() => setAdminTab(t)} className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${adminTab === t ? 'bg-white shadow-sm' : 'text-gray-400'}`}>{t}</button>
                  ))}
                </div>
              </div>

              {adminTab === 'partners' && (
                <div className="bg-white rounded-3xl border shadow-sm overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-gray-50 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                      <tr><th className="p-6">ร้านค้า</th><th className="p-6">โควตาทั้งหมด (KG)</th><th className="p-6 text-right"></th></tr>
                    </thead>
                    <tbody className="divide-y text-xs font-bold">
                      {(allPartners || []).map((p, i) => (
                        <tr key={i} className="hover:bg-gray-50">
                          <td className="p-6 italic text-[#3C2A21]">{p.company || "-"}</td>
                          <td className="p-6">
                            <input 
                              type="number" 
                              defaultValue={safeNum(p.total_allocation)} 
                              onBlur={(e) => callGAS('updateAllocation', [p.email, e.target.value], () => alert("อัปเดตแล้ว"))}
                              className="w-24 p-2 border rounded-lg text-center font-black"
                            />
                          </td>
                          <td className="p-6 text-right">
                             <button onClick={() => callGAS('deleteRecord', ['Users', p.rowid], () => setView('landing'))} className="text-red-200 hover:text-red-500"><Icon name="Trash2" size={16}/></button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {adminTab === 'withdrawals' && (
                <div className="bg-white rounded-3xl border shadow-sm overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-gray-50 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                      <tr><th className="p-6">พาร์ทเนอร์</th><th className="p-6 text-center">จำนวน (KG)</th><th className="p-6 text-right">วันที่</th></tr>
                    </thead>
                    <tbody className="divide-y text-xs font-bold">
                      {(allWithdrawals || []).slice().reverse().map((w, i) => (
                        <tr key={i} className="hover:bg-gray-50">
                          <td className="p-6 italic">{w.email}</td>
                          <td className="p-6 text-center text-lg font-black">{safeNum(w.amount).toFixed(1)}</td>
                          <td className="p-6 text-right text-gray-300 font-normal">{new Date(w.timestamp).toLocaleDateString()}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {/* Dashboard View */}
          {view === 'dashboard' && user && (
            <div className="max-w-4xl mx-auto px-6 py-12 animate-in text-left">
              <div className="bg-white p-10 rounded-3xl border shadow-sm mb-8 flex justify-between items-center">
                <div>
                  <h2 className="text-4xl font-black text-[#3C2A21] italic uppercase leading-none">{user.company}</h2>
                  <p className="text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-widest">{user.email}</p>
                </div>
                <div className="text-right">
                   <p className="text-[10px] font-black text-[#D4A373] uppercase mb-1">Remaining</p>
                   <p className="text-5xl font-black text-[#3C2A21] leading-none">{remainingAllocation.toFixed(1)} <span className="text-sm opacity-20 italic">KG</span></p>
                </div>
              </div>
              <button onClick={() => {
                const amt = prompt("ระบุจำนวนที่ต้องการเบิก (KG):", "1");
                if(amt && safeNum(amt) <= remainingAllocation) callGAS('requestWithdrawal', [user.email, amt], () => setView('dashboard'));
                else if(amt) alert("โควตาไม่พอหรือข้อมูลไม่ถูกต้อง");
              }} className="w-full py-5 bg-[#3C2A21] text-white rounded-2xl font-black uppercase shadow-xl hover:bg-black transition-all">เบิกกาแฟตอนนี้</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(createElement(App));
  </script>
</body>
</html>
