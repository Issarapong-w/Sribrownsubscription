<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRI BROWN - B2B Coffee System (GitHub Version)</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700;900&display=swap');
    body { font-family: 'Noto Sans Thai', sans-serif; margin: 0; padding: 0; }
    .animate-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#FAF9F6] text-[#3C2A21]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, createElement, useMemo } = React;

    // *** สำคัญ: วาง URL ของ Google Apps Script Web App ที่นี่ ***
    const GAS_WEBAPP_URL = ""; 

    const safeNum = (val) => {
      if (val === null || val === undefined) return 0;
      if (typeof val === 'number') return val;
      const cleanVal = String(val).replace(/,/g, '').replace(/[^\d.-]/g, '');
      const parsed = parseFloat(cleanVal);
      return isNaN(parsed) ? 0 : parsed;
    };

    const Icon = ({ name, size = 24, className = "" }) => {
      try {
        if (typeof lucide === 'undefined' || !lucide.icons) return null;
        const iconKey = name.charAt(0).toLowerCase() + name.slice(1);
        const iconData = lucide.icons[name] || lucide.icons[iconKey] || lucide.icons.coffee;
        if (!iconData) return null;
        return (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {iconData.map(([tag, attrs], i) => createElement(tag, { ...attrs, key: i }))}
          </svg>
        );
      } catch (e) { return null; }
    };

    const PLANS_DATA = {
      monthly: [
        { id: 'tiny', name: 'Tiny-pack', price: 1890, features: ['เมล็ดกาแฟ 3 KG', 'Drip bag tester 3 bag'], gradient: 'from-[#FAF9F6] to-[#F5F2F0]', textColor: 'text-[#3C2A21]' },
        { id: 'medium', name: 'Medium-pack', price: 3100, features: ['เมล็ดกาแฟ 5 KG', 'Drip bag tester 3 bag'], gradient: 'from-[#F5F2F0] to-[#E8E2DE]', textColor: 'text-[#3C2A21]' },
        { id: 'pro', name: 'Pro PACK', price: 6000, features: ['เมล็ดกาแฟ 10 KG', 'Drip bag tester 5 bag'], gradient: 'from-[#3C2A21] to-[#1A120B]', textColor: 'text-white' }
      ],
      annually: [
        { id: 'starter', name: 'Starter', price: 21600, features: ['เมล็ดกาแฟ 3 KG * 12 เดือน'], gradient: 'from-[#FAF9F6] to-[#F5F2F0]', textColor: 'text-[#3C2A21]' },
        { id: 'growth', name: 'Growth', price: 35400, features: ['เมล็ดกาแฟ 5 KG * 12 เดือน'], gradient: 'from-[#F5F2F0] to-[#E8E2DE]', textColor: 'text-[#3C2A21]' },
        { id: 'enterprise', name: 'Organization', price: 68400, features: ['เมล็ดกาแฟ 10 KG * 12 เดือน'], gradient: 'from-[#3C2A21] to-[#1A120B]', textColor: 'text-white' }
      ]
    };

    function App() {
      const [view, setView] = useState('landing');
      const [user, setUser] = useState(null);
      const [billingCycle, setBillingCycle] = useState('monthly');
      const [loading, setLoading] = useState(false);
      
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [selectedPlan, setSelectedPlan] = useState(null);
      const [isWithdrawModalOpen, setIsWithdrawModalOpen] = useState(false);
      const [withdrawAmount, setWithdrawAmount] = useState(1);

      const [adminTab, setAdminTab] = useState('overview');
      const [allOrders, setAllOrders] = useState([]);
      const [allPartners, setAllPartners] = useState([]);
      const [allWithdrawals, setAllWithdrawals] = useState([]);
      const [userSubs, setUserSubs] = useState([]);
      const [userWithdrawals, setUserWithdrawals] = useState([]);

      // เปลี่ยนมาใช้ fetch API สำหรับรันภายนอก GAS
      const callGAS = async (action, args = [], successCallback) => {
        if (!GAS_WEBAPP_URL) {
          console.warn("ไม่ได้ตั้งค่า GAS_WEBAPP_URL ระบบจะใช้โหมด Demo");
          if (action === 'checkLogin') successCallback({email: "demo@sribrown.com", company: "SRI BROWN DEMO", role: "admin", total_allocation: 20, phone: "081-xxx-xxxx", address: "Khon Kaen"});
          else if (successCallback) successCallback([]);
          return;
        }

        setLoading(true);
        try {
          const response = await fetch(GAS_WEBAPP_URL, {
            method: 'POST',
            body: JSON.stringify({ action, args })
          });
          const result = await response.json();
          setLoading(false);
          if (result.error) throw new Error(result.error);
          if (successCallback) successCallback(result.data);
        } catch (err) {
          setLoading(false);
          console.error("API Error:", err);
          alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
        }
      };

      const remainingAllocation = useMemo(() => {
        if (!user) return 0;
        const withdrawals = Array.isArray(userWithdrawals) ? userWithdrawals : [];
        const totalUsed = withdrawals.reduce((sum, item) => sum + safeNum(item?.amount), 0);
        return Math.max(0, safeNum(user?.total_allocation) - totalUsed);
      }, [user, userWithdrawals]);

      const handleLogin = (e) => {
        e.preventDefault();
        const email = e.target.elements.email?.value.trim();
        const password = e.target.elements.password?.value.trim();
        callGAS('checkLogin', [email, password], (res) => {
          if (res) { setUser(res); setView('landing'); } 
          else { alert("❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง"); }
        });
      };

      const handleRegister = (e) => {
        e.preventDefault();
        const els = e.target.elements;
        const data = {
          company: els.company.value.trim(),
          email: els.email.value.trim(),
          phone: els.phone.value.trim(),
          address: els.address.value.trim(),
          password: els.password.value.trim()
        };
        callGAS('registerUser', [data], () => {
          alert("✅ สมัครพาร์ทเนอร์สำเร็จ!");
          setView('login');
        });
      };

      const handleWithdraw = (e) => {
        e.preventDefault();
        const amt = safeNum(withdrawAmount);
        if (amt <= 0 || amt > remainingAllocation) return alert("❌ จำนวนไม่ถูกต้องหรือโควตาไม่พอ");
        callGAS('requestWithdrawal', [user?.email, amt], () => {
          setIsWithdrawModalOpen(false);
          alert("✅ ส่งคำขอเบิกกาแฟเรียบร้อย");
          fetchUserData();
        });
      };

      const confirmSubscription = () => {
        if (!user) return;
        const data = { email: user.email, company: user.company, planName: selectedPlan?.name, price: selectedPlan?.price, billingCycle };
        callGAS('saveNewSubscription', [data], () => {
          setIsModalOpen(false);
          alert("🎉 จองแพ็กเกจเรียบร้อย");
          setView('dashboard');
        });
      };

      const refreshAdminData = () => {
        if (!user || user.role !== 'admin') return;
        callGAS('getAllOrders', [], setAllOrders);
        callGAS('getAllPartners', [], setAllPartners);
        callGAS('getAllWithdrawals', [], setAllWithdrawals);
      };

      const fetchUserData = () => {
        if (user?.email) {
          callGAS('getSubscriptions', [user.email], setUserSubs);
          callGAS('getWithdrawals', [user.email], setUserWithdrawals);
        }
      };

      useEffect(() => {
        if (view === 'admin') refreshAdminData();
        if (view === 'dashboard') fetchUserData();
      }, [view, user?.email]);

      const formatDate = (dateStr) => {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        return isNaN(d.getTime()) ? "ไม่ทราบวันที่" : d.toLocaleString('th-TH');
      };

      const Navbar = () => (
        <nav className="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
          <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('landing')}>
            <div className="bg-[#3C2A21] p-2 rounded-xl text-white shadow-md"><Icon name="Coffee" size={22}/></div>
            <div className="text-left leading-none">
              <h1 className="font-black text-lg text-[#3C2A21] uppercase italic">SRI BROWN</h1>
              <p className="text-[8px] font-bold uppercase tracking-[0.3em] text-[#D4A373] mt-1">COFFEE ROASTERY</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            {user ? (
              <div className="flex items-center gap-4">
                <button onClick={() => setView(user.role === 'admin' ? 'admin' : 'dashboard')} className="text-[10px] font-black uppercase tracking-widest px-6 py-2 border-2 border-[#3C2A21] rounded-full hover:bg-[#3C2A21] hover:text-white transition-all">
                   {user.role === 'admin' ? "Admin" : "Dashboard"}
                </button>
                <button onClick={() => { setUser(null); setView('landing'); }} className="text-gray-300 hover:text-red-500"><Icon name="LogOut" size={20}/></button>
              </div>
            ) : (
              <div className="flex gap-4">
                <button onClick={() => setView('login')} className="text-xs font-bold hover:text-[#D4A373]">เข้าสู่ระบบ</button>
                <button onClick={() => setView('register')} className="bg-[#3C2A21] text-white text-[10px] font-black uppercase px-6 py-2.5 rounded-full shadow-lg">สมัครพาร์ทเนอร์</button>
              </div>
            )}
          </div>
        </nav>
      );

      return (
        <div className="min-h-screen flex flex-col">
          <Navbar />
          {loading && (
            <div className="fixed top-0 left-0 w-full h-1 bg-gray-100 z-[100] overflow-hidden">
              <div className="h-full bg-[#3C2A21] w-1/3 animate-[loading_1.5s_infinite] origin-left" />
            </div>
          )}
          
          <div className="flex-grow">
            {view === 'landing' && (
              <main className="animate-in pb-20 text-center">
                <header className="pt-24 pb-12">
                  <h2 className="text-5xl md:text-7xl font-black text-[#3C2A21] mb-10 uppercase tracking-tighter italic">SRI BROWN Coffee B2B</h2>
                  <p className="text-[#D4A373] max-w-xl mx-auto mb-20 text-xl font-bold uppercase tracking-tight opacity-70 italic text-center">คัดสรรเมล็ดกาแฟที่ดีที่สุดเพื่อร้านของคุณ</p>
                  <div className="flex items-center justify-center space-x-12">
                    <button onClick={() => setBillingCycle('monthly')} className={`text-sm font-black uppercase tracking-widest ${billingCycle === 'monthly' ? 'text-[#3C2A21] border-b-2 border-[#3C2A21]' : 'text-gray-300'}`}>รายเดือน</button>
                    <button onClick={() => setBillingCycle('annually')} className={`text-sm font-black uppercase tracking-widest ${billingCycle === 'annually' ? 'text-[#3C2A21] border-b-2 border-[#3C2A21]' : 'text-gray-300'}`}>รายปี</button>
                  </div>
                </header>
                <div className="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-10 text-left">
                  {PLANS_DATA[billingCycle].map(plan => (
                    <div key={plan.id} className={`relative overflow-hidden rounded-[3rem] bg-gradient-to-br ${plan.gradient} border border-[#E8E2DE]/50 shadow-xl flex flex-col h-full hover:scale-[1.02] transition-transform`}>
                      <div className="p-10 flex-grow">
                        <h3 className={`text-3xl font-black uppercase mb-6 ${plan.textColor}`}>{plan.name}</h3>
                        <div className={`mb-8 ${plan.textColor}`}>
                          <span className="text-6xl font-black">{plan.price.toLocaleString()}</span>
                          <span className="text-xl font-bold ml-1 italic opacity-60">฿</span>
                        </div>
                        <ul className="space-y-4">
                          {plan.features.map((f, i) => <li key={i} className={`text-xs font-bold ${plan.textColor} opacity-70 flex items-center`}><Icon name="Check" size={14} className="mr-3"/>{f}</li>)}
                        </ul>
                      </div>
                      <div className="p-10 pt-0">
                        <button onClick={() => { setSelectedPlan(plan); if(!user) setView('login'); else setIsModalOpen(true); }} className={`w-full py-5 rounded-2xl font-black text-sm uppercase ${plan.textColor === 'text-white' ? 'bg-white text-[#3C2A21]' : 'bg-[#3C2A21] text-white'} shadow-xl transition-all`}>จองแพ็กเกจ</button>
                      </div>
                    </div>
                  ))}
                </div>
              </main>
            )}

            {view === 'login' && (
              <div className="max-w-4xl mx-auto my-20 bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border animate-in">
                <div className="bg-[#3C2A21] p-16 text-white md:w-1/2 flex flex-col justify-between italic">
                  <div><Icon name="Coffee" size={48} className="text-[#D4A373] mb-8"/><h2 className="text-5xl font-black uppercase italic tracking-tighter text-left text-white leading-none">Welcome<br/>Partner.</h2></div>
                  <p className="text-[#D4A373] text-[9px] font-black uppercase tracking-[0.4em] italic opacity-50 text-left uppercase">SRI BROWN INTERNAL NETWORK</p>
                </div>
                <div className="p-16 md:w-1/2 bg-[#FCFBFA] text-left">
                  <h3 className="text-xl font-extrabold uppercase mb-10 text-[#3C2A21] italic">เข้าสู่ระบบ</h3>
                  <form onSubmit={handleLogin} className="space-y-6">
                    <input name="email" type="email" required placeholder="อีเมล" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm shadow-sm" />
                    <input name="password" type="password" required placeholder="รหัสผ่าน" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm shadow-sm" />
                    <button type="submit" className="w-full py-5 bg-[#3C2A21] text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl">Authorize Access</button>
                    <p className="text-center text-[10px] font-bold text-[#D4A373] mt-8 uppercase cursor-pointer underline" onClick={() => setView('register')}>ยังไม่ได้เป็นพาร์ทเนอร์? สมัครที่นี่</p>
                  </form>
                </div>
              </div>
            )}

            {view === 'register' && (
              <div className="max-w-4xl mx-auto my-20 bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border animate-in">
                <div className="bg-[#3C2A21] p-16 text-white md:w-1/2 flex flex-col justify-between italic">
                  <div><Icon name="UserPlus" size={48} className="text-[#D4A373] mb-8"/><h2 className="text-5xl font-black uppercase italic tracking-tighter text-left text-white leading-none">Join Our<br/>Network.</h2></div>
                  <p className="text-[#D4A373] text-[9px] font-black uppercase tracking-[0.4em] italic opacity-50 text-left uppercase">PARTNERSHIP PROGRAM</p>
                </div>
                <div className="p-16 md:w-1/2 bg-[#FCFBFA]">
                  <form onSubmit={handleRegister} className="space-y-4 text-left">
                    <input name="company" required placeholder="ชื่อร้าน / บริษัท" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm" />
                    <input name="email" type="email" required placeholder="อีเมล" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm" />
                    <input name="phone" type="tel" required placeholder="เบอร์โทรศัพท์" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm" />
                    <textarea name="address" required placeholder="ที่อยู่จัดส่ง" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm h-24 resize-none shadow-sm"></textarea>
                    <input name="password" type="password" required placeholder="รหัสผ่าน" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm" />
                    <button type="submit" className="w-full py-5 bg-[#3C2A21] text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl mt-4">สมัครพาร์ทเนอร์</button>
                    <p className="text-center text-[10px] font-bold text-[#D4A373] mt-8 uppercase cursor-pointer underline" onClick={() => setView('login')}>กลับไปหน้าเข้าสู่ระบบ</p>
                  </form>
                </div>
              </div>
            )}

            {view === 'dashboard' && user && (
              <div className="max-w-7xl mx-auto px-6 py-20 animate-in text-left">
                <div className="bg-white p-10 rounded-[2.5rem] border border-[#E8E2DE] shadow-sm mb-12 flex flex-col md:flex-row justify-between items-center gap-8 relative overflow-hidden">
                  <div className="flex items-center gap-8 z-10 text-left leading-none">
                    <div className="w-20 h-20 bg-[#F5F2F0] rounded-full flex items-center justify-center text-[#3C2A21] border-2 border-[#E8E2DE] shadow-inner"><Icon name="Building2" size={40}/></div>
                    <div>
                      <h2 className="text-5xl font-black uppercase italic tracking-tighter text-[#3C2A21]">{user?.company || "My Shop"}</h2>
                      <div className="flex flex-wrap gap-x-6 gap-y-2 mt-4 text-[10px] font-black text-[#D4A373] uppercase tracking-widest italic">
                        <span className="flex items-center gap-2"><Icon name="Mail" size={14}/> {user?.email}</span>
                        <span className="flex items-center gap-2"><Icon name="Phone" size={14}/> {user?.phone}</span>
                      </div>
                    </div>
                  </div>
                  <button onClick={() => { setIsWithdrawModalOpen(true); setWithdrawAmount(1); }} className="bg-[#3C2A21] text-white px-10 py-4 rounded-full font-black text-sm uppercase shadow-xl flex items-center gap-3">
                    <Icon name="Package" size={18}/> เบิกกาแฟ
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
                   <div className="bg-white p-10 rounded-[2.5rem] border border-[#E8E2DE] shadow-sm text-left leading-none">
                      <p className="text-[10px] font-black uppercase text-[#D4A373] mb-4 tracking-widest text-left leading-none">โควตาคงเหลือ</p>
                      <p className="text-7xl font-black text-[#3C2A21] leading-none italic">
                        {remainingAllocation.toFixed(1)} 
                        <span className="text-xl opacity-20 ml-1 italic leading-none">/ {safeNum(user?.total_allocation)} KG</span>
                      </p>
                      <div className="w-full h-1.5 bg-gray-50 rounded-full mt-10 overflow-hidden shadow-inner">
                        <div 
                          className="h-full bg-[#3C2A21] transition-all duration-700 ease-out" 
                          style={{ width: `${(remainingAllocation / Math.max(1, safeNum(user?.total_allocation))) * 100}%` }} 
                        />
                      </div>
                   </div>
                   <div className="bg-white p-10 rounded-[2.5rem] border border-[#E8E2DE] shadow-sm text-left leading-none">
                      <p className="text-[10px] font-black uppercase text-[#D4A373] mb-4 tracking-widest text-left leading-none">เบิกไปแล้ว</p>
                      <p className="text-3xl font-black text-[#3C2A21] uppercase italic leading-none">{(Math.max(0, safeNum(user?.total_allocation) - remainingAllocation)).toFixed(1)} KG</p>
                      <p className="text-[10px] font-bold text-gray-400 mt-4 italic">{(Array.isArray(userWithdrawals) ? userWithdrawals : []).length} ครั้ง</p>
                   </div>
                   <div className="bg-[#3C2A21] p-10 rounded-[2.5rem] shadow-xl text-white text-left flex flex-col justify-center leading-none">
                      <p className="text-[10px] font-black uppercase text-white/20 mb-4 tracking-widest text-left leading-none">Status</p>
                      <p className="text-xl font-black italic uppercase text-[#D4A373]">Verified Partner</p>
                      <div className="mt-6 flex gap-2 items-center"><div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"/><span className="text-[9px] font-black uppercase">Quota Active</span></div>
                   </div>
                </div>

                <h3 className="text-2xl font-black uppercase italic tracking-tighter text-[#3C2A21] mb-8">ประวัติการเบิกกาแฟ</h3>
                <div className="bg-white border border-[#E8E2DE] rounded-[2rem] overflow-hidden shadow-sm">
                  <table className="w-full text-left">
                    <thead className="bg-[#F5F2F0] text-[9px] font-black text-[#D4A373] uppercase tracking-widest text-left">
                      <tr><th className="px-8 py-5">วันเวลาที่ทำรายการ</th><th className="px-8 py-5 text-center">จำนวน (KG)</th><th className="px-8 py-5">สถานะ</th></tr>
                    </thead>
                    <tbody className="divide-y text-xs font-bold text-left">
                      {(Array.isArray(userWithdrawals) ? [...userWithdrawals] : []).reverse().map((wd, i) => (
                        <tr key={wd?.rowid || i} className="hover:bg-gray-50 transition-colors">
                          <td className="px-8 py-6">{formatDate(wd?.timestamp)}</td>
                          <td className="px-8 py-6 text-center text-xl font-black text-[#3C2A21]">{safeNum(wd?.amount).toFixed(1)}</td>
                          <td className="px-8 py-6">
                            <span className="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">Completed</span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            {/* ส่วนของ Admin Tab อื่นๆ จะถูก Render เมื่อเป็นสิทธิ์ Admin ... */}
          </div>

          {/* Modals ... */}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(createElement(App));
  </script>
</body>
</html>
