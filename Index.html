<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRI BROWN - Subscription System</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700;900&display=swap');
    body { font-family: 'Noto Sans Thai', sans-serif; margin: 0; padding: 0; }
    .animate-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .custom-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="bg-[#FAF9F6] text-[#3C2A21]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, createElement, useMemo } = React;

    // --- Helper for Safe Number Parsing ---
    const safeNum = (val) => {
      if (val === null || val === undefined) return 0;
      if (typeof val === 'number') return val;
      const parsed = parseFloat(String(val).replace(/[^0-9.]/g, ''));
      return isNaN(parsed) ? 0 : parsed;
    };

    // --- Safe Icon Component ---
    const Icon = ({ name, size = 24, className = "" }) => {
      try {
        // ป้องกันกรณี lucide ยังโหลดไม่เสร็จ
        if (typeof lucide === 'undefined') return null;
        
        // ค้นหาไอคอน (รองรับทั้ง lucide[Name] และ lucide.icons[Name])
        const iconsSource = lucide.icons || lucide;
        const iconKey = name.charAt(0).toUpperCase() + name.slice(1); // Lucide มักใช้ PascalCase
        const iconData = iconsSource[iconKey] || iconsSource[name] || iconsSource.Coffee;
        
        // ถ้าไม่เจอจริงๆ หรือไม่มีข้อมูล map ให้ return null แทนการ crash
        if (!iconData || !Array.isArray(iconData)) return null;

        return (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {iconData.map(([tag, attrs], i) => createElement(tag, { ...attrs, key: i }))}
          </svg>
        );
      } catch (e) { console.error("Icon error:", e); return null; }
    };

    function App() {
      const [view, setView] = useState('landing');
      const [user, setUser] = useState(null);
      const [billingCycle, setBillingCycle] = useState('monthly');
      const [loading, setLoading] = useState(false);
      
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [selectedPlan, setSelectedPlan] = useState(null);
      const [isWithdrawModalOpen, setIsWithdrawModalOpen] = useState(false);
      const [withdrawAmount, setWithdrawAmount] = useState(1);

      const [adminTab, setAdminTab] = useState('overview');
      const [showAllOrders, setShowAllOrders] = useState(false);
      const [allOrders, setAllOrders] = useState([]);
      const [allPartners, setAllPartners] = useState([]);
      const [allWithdrawals, setAllWithdrawals] = useState([]);
      const [userSubs, setUserSubs] = useState([]);
      const [userWithdrawals, setUserWithdrawals] = useState([]);
      const [plansData, setPlansData] = useState({ monthly: [], annually: [] });

      const callGAS = (funcName, args = [], successCallback) => {
        setLoading(true);
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler((res) => { 
              setLoading(false);
              console.log("GAS response:", funcName, res);
              if (successCallback) successCallback(res); 
            })
            .withFailureHandler((err) => { 
              setLoading(false); 
              console.error("GAS Error:", err);
              alert("Backend Error: " + err.message); 
            })[funcName](...args);
        } else {
          setLoading(false);
          console.warn("⚠️ Preview mode - GAS not available. Mock data for:", funcName);
          // Mock data for preview mode
          if (funcName === 'checkLogin') {
            successCallback({email: "demo@sribrown.com", company: "SRI BROWN DEMO", role: "admin", total_allocation: 50, phone: "081-xxx-xxxx", address: "Khon Kaen"});
          } else if (funcName === 'getWithdrawals') {
            successCallback([
              { id: "WD-001", email: args[0], amount: 5, status: "completed", timestamp: new Date(Date.now() - 86400000), rowid: 2 },
              { id: "WD-002", email: args[0], amount: 10, status: "completed", timestamp: new Date(), rowid: 3 }
            ]);
          } else if (funcName === 'getSubscriptions') {
            successCallback([
              { id: "SUB-001", email: args[0], company: "DEMO", planName: "Pro PACK", price: 6000, billingCycle: "monthly", status: "active", date: new Date(), rowid: 2 }
            ]);
          } else if (funcName === 'getPackages') {
            successCallback([
              { rowid: 2, id: 'tiny', name: 'Tiny-pack', price: 1890, kg: 3, features: 'เมล็ดกาแฟ 3 KG, Drip bag tester 3 bag', billingcycle: 'monthly', gradient: 'from-[#FAF9F6] to-[#F5F2F0]', textcolor: 'text-[#3C2A21]' },
              { rowid: 5, id: 'starter', name: 'Starter', price: 21600, kg: 36, features: 'เมล็ดกาแฟ 3 KG * 12 เดือน', billingcycle: 'annually', gradient: 'from-[#FAF9F6] to-[#F5F2F0]', textcolor: 'text-[#3C2A21]' }
            ]);
          } else if (successCallback) {
            successCallback([]);
          }
        }
      };

      // --- Latest subscription info ---
      const currentSubscription = useMemo(() => {
        if (!Array.isArray(userSubs) || userSubs.length === 0) return null;
        const sorted = [...userSubs].sort((a, b) => new Date(b.date) - new Date(a.date));
        return sorted[0];
      }, [userSubs]);

      // --- ยอดคงเหลือดึงจาก User Profile โดยตรง (เพราะ Backend หักยอดให้แล้ว) ---
      const remainingAllocation = useMemo(() => {
        return safeNum(user?.total_allocation);
      }, [user]);

      // --- คำนวณยอดที่ใช้ไปแล้วจากประวัติการเบิก ---
      const totalUsed = useMemo(() => {
        const withdrawals = Array.isArray(userWithdrawals) ? userWithdrawals : [];
        return withdrawals.reduce((sum, item) => sum + safeNum(item?.amount), 0);
      }, [userWithdrawals]);

      const totalCapacity = useMemo(() => remainingAllocation + totalUsed, [remainingAllocation, totalUsed]);

      const handleLogin = (e) => {
        e.preventDefault();
        const emailInput = e.target.elements[0];
        const passwordInput = e.target.elements[1];
        if (!emailInput || !passwordInput) return;

        callGAS('checkLogin', [emailInput.value.trim(), passwordInput.value.trim()], (res) => {
          if (res && typeof res === 'object') {
            setUser(res);
            setView(res.role === 'admin' ? 'admin' : 'dashboard');
            if (res.role !== 'admin') {
              fetchUserData(res.email);
            }
          } else {
            alert("❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง");
          }
        });
      };

      const handleRegister = (e) => {
        e.preventDefault();
        const els = e.target.elements;
        const data = {
          company: els[0].value.trim(),
          email: els[1].value.trim(),
          phone: els[2].value.trim(),
          address: els[3].value.trim(),
          password: els[4].value.trim()
        };
        callGAS('registerUser', [data], () => {
          alert("✅ สมัครพาร์ทเนอร์สำเร็จ!");
          setView('login');
        });
      };

      const handleWithdraw = (e) => {
        e.preventDefault();
        const amt = safeNum(withdrawAmount);
        if (amt <= 0) return alert("❌ กรุณาระบุจำนวนที่ถูกต้อง");
        if (amt > remainingAllocation) return alert("❌ ยอดคงเหลือไม่เพียงพอ");
        
        callGAS('requestWithdrawal', [user?.email, amt], () => {
          setIsWithdrawModalOpen(false);
          alert("✅ ส่งคำขอเบิกกาแฟเรียบร้อย");
          // Update withdrawals state immediately for instant UI update
          const newWithdrawal = {
            id: "WD-" + Date.now(),
            amount: amt,
            status: 'pending',
            timestamp: new Date(),
            email: user?.email
          };
          setUserWithdrawals(prev => Array.isArray(prev) ? [...prev, newWithdrawal] : [newWithdrawal]);
          // Update user's total_allocation in state
          setUser(prev => prev ? {...prev, total_allocation: safeNum(prev.total_allocation) - amt} : prev);
          fetchUserData();
        });
      };

      const confirmSubscription = () => {
        if (!user) return;
        const data = { 
          email: user.email, 
          company: user.company, 
          planName: selectedPlan?.name || "Unknown Plan", 
          price: selectedPlan?.price || 0, 
          amountKg: selectedPlan?.kg || 0,
          billingCycle 
        };
        callGAS('saveNewSubscription', [data], () => {
          setIsModalOpen(false);
          alert("🎉 จองแพ็กเกจเรียบร้อย กรุณาแจ้งชำระเงินกับเจ้าหน้าที่");
          setView('dashboard');
        });
      };

      const fetchPlans = () => {
        callGAS('getPackages', [], (res) => {
          if (Array.isArray(res)) {
            const grouped = res.reduce((acc, p) => {
              const cycle = p.billingcycle || 'monthly';
              if (!acc[cycle]) acc[cycle] = [];
              acc[cycle].push({
                ...p,
                features: String(p.features || "").split(',').map(f => f.trim()),
                price: safeNum(p.price),
                kg: safeNum(p.kg)
              });
              return acc;
            }, { monthly: [], annually: [] });
            setPlansData(grouped);
          }
        });
      };

      const refreshAdminData = () => {
        if (!user || user.role !== 'admin') return;
        callGAS('getAllOrders', [], (res) => setAllOrders(Array.isArray(res) ? res : []));
        callGAS('getAllPartners', [], (res) => setAllPartners(Array.isArray(res) ? res : []));
        callGAS('getAllWithdrawals', [], (res) => setAllWithdrawals(Array.isArray(res) ? res : []));
        fetchPlans();
      };

      const fetchUserData = (email) => {
        const targetEmail = email || user?.email;
        if (targetEmail) {
          callGAS('getSubscriptions', [targetEmail], (res) => setUserSubs(Array.isArray(res) ? res : []));
          callGAS('getWithdrawals', [targetEmail], (res) => setUserWithdrawals(Array.isArray(res) ? res : []));
          callGAS('getUserProfile', [targetEmail], (res) => { if(res) setUser(res); });
        }
      };

      useEffect(() => {
        fetchPlans();
        if (view === 'admin') refreshAdminData();
        if (view === 'dashboard') fetchUserData();
      }, [view, user?.email]);

      // --- Helper for Safe Dates ---
      const formatDate = (dateStr) => {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        return isNaN(d.getTime()) ? "ไม่ทราบวันที่" : d.toLocaleString('th-TH');
      };

      // --- UI Components ---
      const Navbar = () => (
        <nav className="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
          <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('landing')}>
            <div className="bg-[#3C2A21] p-2 rounded-xl text-white shadow-md"><Icon name="Coffee" size={22}/></div>
            <div className="text-left leading-none">
              <h1 className="font-black text-lg text-[#3C2A21] uppercase italic">SRI BROWN</h1>
              <p className="text-[8px] font-bold uppercase tracking-[0.3em] text-[#D4A373] mt-1">COFFEE ROASTERY</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            {user ? (
              <div className="flex items-center gap-4">
                <button 
                  onClick={() => setView(user.role === 'admin' ? 'admin' : 'dashboard')} 
                  className="text-[10px] font-black uppercase tracking-widest px-6 py-2 border-2 border-[#3C2A21] rounded-full hover:bg-[#3C2A21] hover:text-white transition-all shadow-sm"
                >
                   {user.role === 'admin' ? "Admin Console" : "My Dashboard"}
                </button>
                <button 
                  onClick={() => { setUser(null); setView('landing'); }} 
                  className="text-gray-300 hover:text-red-500 transition-colors p-2"
                >
                  <Icon name="LogOut" size={20}/>
                </button>
              </div>
            ) : (
              <div className="flex gap-4">
                <button onClick={() => setView('login')} className="text-xs font-bold hover:text-[#D4A373] transition-colors">เข้าสู่ระบบ</button>
                <button onClick={() => setView('register')} className="bg-[#3C2A21] text-white text-[10px] font-black uppercase px-6 py-2.5 rounded-full shadow-lg hover:bg-black transition-all">สมัครพาร์ทเนอร์</button>
              </div>
            )}
          </div>
        </nav>
      );

      return (
        <div className="min-h-screen flex flex-col">
          <Navbar />
          {loading && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-[#FAF9F6]/80 backdrop-blur-sm animate-in transition-all">
              <div className="flex flex-col items-center">
                <div className="relative w-20 h-20 flex items-center justify-center">
                  <div className="absolute inset-0 border-4 border-[#E8E2DE] rounded-full"></div>
                  <div className="absolute inset-0 border-4 border-[#3C2A21] rounded-full border-t-transparent custom-spin"></div>
                  <div className="text-[#3C2A21] animate-pulse">
                    <Icon name="Coffee" size={28} />
                  </div>
                </div>
                <div className="mt-8 flex flex-col items-center gap-2">
                  <p className="text-[10px] font-black uppercase tracking-[0.4em] text-[#3C2A21] italic leading-none">Sri Brown</p>
                  <p className="text-[9px] font-bold uppercase tracking-[0.1em] text-[#D4A373] opacity-60">กำลังโหลดข้อมูล...</p>
                </div>
              </div>
            </div>
          )}
          <div className="flex-grow">
            {view === 'landing' && (
              <main className="animate-in pb-20 text-center">
                <header className="pt-24 pb-12">
                  <h2 className="text-5xl md:text-7xl font-black text-[#3C2A21] mb-10 uppercase tracking-tighter leading-none italic">SRI BROWN Coffee Subscription</h2>
                  <p className="text-[#D4A373] max-w-xl mx-auto mb-20 text-xl font-bold uppercase tracking-tight opacity-70 italic">คัดสรรเมล็ดกาแฟที่ดีที่สุดเพื่อร้านของคุณ</p>
                  <div className="flex items-center justify-center space-x-12">
                    <button onClick={() => setBillingCycle('monthly')} className={`text-sm font-black uppercase tracking-widest ${billingCycle === 'monthly' ? 'text-[#3C2A21] border-b-2 border-[#3C2A21]' : 'text-gray-300'}`}>รายเดือน</button>
                    <button onClick={() => setBillingCycle('annually')} className={`text-sm font-black uppercase tracking-widest ${billingCycle === 'annually' ? 'text-[#3C2A21] border-b-2 border-[#3C2A21]' : 'text-gray-300'}`}>รายปี</button>
                  </div>
                </header>
                <div className="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-10 text-left">
                  {plansData[billingCycle] && plansData[billingCycle].map(plan => {
                    // คำนวณส่วนลดและราคาปกติเมื่อเป็นรายปี
                    const pricingComparison = billingCycle === 'annually' ? (() => {
                      const monthlyEquivalentKg = plan.kg / 12;
                      const matchingMonthlyPlan = (plansData.monthly || []).find(m => m.kg === monthlyEquivalentKg);
                      if (!matchingMonthlyPlan || matchingMonthlyPlan.price <= 0) return { discount: null, normalPrice: null };
                      
                      const monthlyPriceForAnnual = plan.price / 12;
                      const savingsPercent = Math.round(((matchingMonthlyPlan.price - monthlyPriceForAnnual) / matchingMonthlyPlan.price) * 100);
                      const normalPrice = matchingMonthlyPlan.price * 12;
                      
                      return { 
                        discount: savingsPercent > 0 ? savingsPercent : null,
                        normalPrice: normalPrice > plan.price ? normalPrice : null
                      };
                    })() : { discount: null, normalPrice: null };

                    const { discount, normalPrice } = pricingComparison;

                    return (
                    <div key={plan.id} className={`relative overflow-hidden rounded-[3rem] bg-gradient-to-br ${plan.gradient} border border-[#E8E2DE]/50 shadow-xl flex flex-col h-full hover:scale-[1.02] transition-transform`}>
                      {discount && (
                        <div className="absolute top-8 right-[-35px] bg-[#D4A373] text-[#3C2A21] text-[10px] font-black py-1 px-12 rotate-45 shadow-lg uppercase tracking-widest z-20">
                          SAVE {discount}%
                        </div>
                      )}
                      <div className="p-10 flex-grow">
                        <h3 className={`text-3xl font-black uppercase tracking-tight mb-6 ${plan.textColor}`}>{plan.name}</h3>
                        <div className={`mb-8 ${plan.textColor}`}>
                          {normalPrice && (
                            <span className="text-xl line-through opacity-30 mr-3 font-bold italic">
                              {normalPrice.toLocaleString()}
                            </span>
                          )}
                          <span className="text-6xl font-black">{plan.price.toLocaleString()}</span>
                          <span className="text-xl font-bold ml-1 italic opacity-60">฿</span>
                          <p className="text-[10px] font-bold opacity-50 uppercase tracking-widest mt-2 italic">
                            เฉลี่ยเพียง {(plan.price / Math.max(1, plan.kg)).toFixed(0)} ฿ ต่อกิโลกรัม
                          </p>
                        </div>
                        <ul className="space-y-4">
                          {plan.features.map((f, i) => <li key={i} className={`text-xs font-bold ${plan.textColor} opacity-70 flex items-center`}><Icon name="Check" size={14} className="mr-3"/>{f}</li>)}
                        </ul>
                      </div>
                      <div className="p-10 pt-0">
                        <button onClick={() => { setSelectedPlan(plan); if(!user) setView('login'); else setIsModalOpen(true); }} className={`w-full py-5 rounded-2xl font-black text-sm uppercase tracking-widest ${plan.textColor === 'text-white' ? 'bg-white text-[#3C2A21]' : 'bg-[#3C2A21] text-white'} shadow-xl active:scale-95 transition-all`}>จองแพ็กเกจ</button>
                      </div>
                    </div>
                  );})}
                </div>
              </main>
            )}

            {view === 'login' && (
              <div className="max-w-4xl mx-auto my-20 bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border animate-in">
                <div className="bg-[#3C2A21] p-16 text-white md:w-1/2 flex flex-col justify-between italic">
                  <div><Icon name="Coffee" size={48} className="text-[#D4A373] mb-8"/><h2 className="text-5xl font-black uppercase italic tracking-tighter leading-tight text-left">Welcome<br/>Partner.</h2></div>
                  <p className="text-[#D4A373] text-[9px] font-black uppercase tracking-[0.4em] italic opacity-50 text-left">SRI BROWN INTERNAL NETWORK</p>
                </div>
                <div className="p-16 md:w-1/2 bg-[#FCFBFA]">
                  <h3 className="text-xl font-extrabold uppercase mb-10 text-[#3C2A21] italic text-left">เข้าสู่ระบบ</h3>
                  <form onSubmit={handleLogin} className="space-y-6">
                    <input type="email" required placeholder="อีเมล" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm shadow-sm" />
                    <input type="password" required placeholder="รหัสผ่าน" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm shadow-sm" />
                    <button type="submit" className="w-full py-5 bg-[#3C2A21] text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl hover:bg-black transition-all">Log in</button>
                    <p className="text-center text-[10px] font-bold text-[#D4A373] mt-8 uppercase cursor-pointer underline" onClick={() => setView('register')}>ยังไม่ได้เป็นพาร์ทเนอร์? สมัครที่นี่</p>
                  </form>
                </div>
              </div>
            )}

            {view === 'register' && (
              <div className="max-w-4xl mx-auto my-20 bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border animate-in">
                <div className="bg-[#3C2A21] p-16 text-white md:w-1/2 flex flex-col justify-between italic">
                  <div><Icon name="UserPlus" size={48} className="text-[#D4A373] mb-8"/><h2 className="text-5xl font-black uppercase italic tracking-tighter leading-tight text-left">Join Our<br/>Network.</h2></div>
                  <p className="text-[#D4A373] text-[9px] font-black uppercase tracking-[0.4em] italic opacity-50 text-left">PARTNERSHIP PROGRAM</p>
                </div>
                <div className="p-16 md:w-1/2 bg-[#FCFBFA]">
                  <form onSubmit={handleRegister} className="space-y-4 text-left">
                    <input required placeholder="ชื่อร้าน / บริษัท" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm shadow-sm" />
                    <input type="email" required placeholder="อีเมล" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm shadow-sm" />
                    <input type="tel" required placeholder="เบอร์โทรศัพท์" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm shadow-sm" />
                    <textarea required placeholder="ที่อยู่ร้าน / ที่อยู่สำหรับจัดส่ง" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm h-24 resize-none shadow-sm"></textarea>
                    <input type="password" required placeholder="รหัสผ่าน" className="w-full px-6 py-4 bg-white border rounded-2xl outline-none focus:border-[#3C2A21] font-bold text-sm shadow-sm" />
                    <button type="submit" className="w-full py-5 bg-[#3C2A21] text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl mt-4">บันทึกข้อมูลสมัครพาร์ทเนอร์</button>
                    <p className="text-center text-[10px] font-bold text-[#D4A373] mt-8 uppercase cursor-pointer underline tracking-widest" onClick={() => setView('login')}>กลับไปหน้าเข้าสู่ระบบ</p>
                  </form>
                </div>
              </div>
            )}

            {view === 'dashboard' && user && (
              <div className="max-w-7xl mx-auto px-6 py-20 animate-in text-left">
                <div className="bg-white p-10 rounded-[2.5rem] border border-[#E8E2DE] shadow-sm mb-12 flex flex-col md:flex-row justify-between items-center gap-8 relative overflow-hidden">
                  <div className="flex items-center gap-8 z-10">
                    <div className="w-20 h-20 bg-[#F5F2F0] rounded-full flex items-center justify-center text-[#3C2A21] border-2 border-[#E8E2DE] shadow-inner"><Icon name="Building2" size={40}/></div>

                        <tbody className="divide-y text-xs font-bold text-left">
                          {[...plansData.monthly, ...plansData.annually].map(p => (
                            <tr key={p.rowid} className="hover:bg-gray-50 transition-colors">
                              <td className="px-8 py-6">
                                <input defaultValue={p.name} onBlur={(e) => callGAS('updatePackage', [p.rowid, 'name', e.target.value], fetchPlans)} className="bg-transparent outline-none focus:text-[#D4A373] w-full font-black uppercase" />
                              </td>
                              <td className="px-8 py-6 text-center">
                                <input type="number" defaultValue={p.price} onBlur={(e) => callGAS('updatePackage', [p.rowid, 'price', e.target.value], fetchPlans)} className="w-24 bg-gray-50 p-2 rounded-lg outline-none focus:border-[#D4A373] text-center" />
                              </td>
                              <td className="px-8 py-6 text-center">
                                <input type="number" defaultValue={p.kg} onBlur={(e) => callGAS('updatePackage', [p.rowid, 'kg', e.target.value], fetchPlans)} className="w-16 bg-gray-50 p-2 rounded-lg outline-none focus:border-[#D4A373] text-center" />
                              </td>
                              <td className="px-8 py-6">
                                <input defaultValue={(p.features || []).join(', ')} onBlur={(e) => callGAS('updatePackage', [p.rowid, 'features', e.target.value], fetchPlans)} className="w-full bg-transparent outline-none focus:text-[#D4A373] font-normal italic" />
                              </td>
                              <td className="px-8 py-6">
                                <select defaultValue={p.billingcycle} onChange={(e) => callGAS('updatePackage', [p.rowid, 'billingCycle', e.target.value], fetchPlans)} className="bg-transparent outline-none font-black uppercase italic text-[10px] text-[#D4A373]">
                                  <option value="monthly">Monthly</option>
                                  <option value="annually">Annually</option>
                                </select>
                              </td>
                              <td className="px-8 py-6">
                                <input defaultValue={p.gradient} onBlur={(e) => callGAS('updatePackage', [p.rowid, 'gradient', e.target.value], fetchPlans)} className="w-full bg-transparent outline-none focus:text-[#D4A373] font-mono text-[10px]" placeholder="from-... to-..." />
                              </td>
                              <td className="px-8 py-6">
                                <input defaultValue={p.textcolor} onBlur={(e) => callGAS('updatePackage', [p.rowid, 'textColor', e.target.value], fetchPlans)} className="w-full bg-transparent outline-none focus:text-[#D4A373] font-mono text-[10px]" placeholder="text-..." />
                              </td>
                              <td className="px-8 py-6 text-right">
                                <button onClick={() => { if(confirm('ยืนยันการลบแพ็กเกจนี้?')) callGAS('deleteRecord', ['Packages', p.rowid], fetchPlans); }} className="p-3 text-red-100 hover:text-red-500 rounded-xl transition-all shadow-sm">
                                  <Icon name="Trash2" size={16}/>
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* Modal Components */}
          {isWithdrawModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 animate-in">
               <div className="absolute inset-0 bg-[#3C2A21]/90 backdrop-blur-sm" onClick={() => setIsWithdrawModalOpen(false)} />
               <div className="bg-[#FCFBFA] rounded-[3rem] max-w-lg w-full p-12 relative z-10 shadow-2xl border border-[#E8E2DE] text-center">
                  <h3 className="text-3xl font-black text-[#3C2A21] uppercase italic tracking-tighter mb-4 text-center leading-none">เบิกกาแฟ</h3>
                  <form onSubmit={handleWithdraw} className="space-y-8">
                    <div className="bg-white p-8 rounded-[2rem] border border-[#E8E2DE] text-left">
                       <label className="text-[9px] font-black uppercase text-[#D4A373] mb-4 block tracking-widest text-left leading-none uppercase">ระบุจำนวนกิโลกรัม</label>
                       <input 
                        type="number" step="0.1" min="0.1" max={remainingAllocation} required
                        value={withdrawAmount} onChange={(e) => setWithdrawAmount(e.target.value)}
                        className="w-full text-5xl font-black text-[#3C2A21] bg-transparent outline-none border-b-4 border-[#F5F2F0] focus:border-[#D4A373] py-4 text-center transition-all"
                       />
                       <p className="mt-4 text-[10px] font-bold text-gray-400 text-left leading-none">โควตาเบิกได้สูงสุด: {remainingAllocation.toFixed(1)} KG</p>
                    </div>
                    <div className="flex gap-4">
                      <button type="button" onClick={() => setIsWithdrawModalOpen(false)} className="flex-1 py-5 border border-[#E8E2DE] rounded-2xl font-black text-xs uppercase tracking-widest transition-all hover:bg-gray-50">ยกเลิก</button>
                      <button type="submit" className="flex-1 py-5 bg-[#3C2A21] text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all hover:bg-black">ยืนยันการเบิก</button>
                    </div>
                  </form>
               </div>
            </div>
          )}

          {isModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 animate-in">
               <div className="absolute inset-0 bg-[#3C2A21]/90 backdrop-blur-sm transition-opacity" onClick={() => setIsModalOpen(false)} />
               <div className="bg-[#FCFBFA] rounded-[3rem] max-w-lg w-full p-12 relative z-10 shadow-2xl border border-[#E8E2DE] text-center">
                  <h3 className="text-3xl font-black text-[#3C2A21] uppercase italic tracking-tighter mb-4 text-center leading-none italic">Confirm Subscription</h3>
                  <div className="bg-white p-8 rounded-[2rem] mb-10 border border-[#E8E2DE] text-left shadow-sm">
                    <p className="text-[9px] font-black uppercase text-[#D4A373] mb-2 tracking-widest text-left uppercase leading-none">Selected Package</p>
                    <p className="text-2xl font-black text-[#3C2A21] uppercase italic mb-2 leading-none text-left">{selectedPlan?.name}</p>
                    <p className="text-3xl font-black text-[#D4A373] tracking-tighter text-left">{selectedPlan?.price?.toLocaleString()} <span className="text-sm opacity-40">฿</span></p>
                  </div>
                  <div className="flex gap-4">
                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-5 border border-[#E8E2DE] rounded-2xl font-black text-xs uppercase tracking-widest transition-all hover:bg-gray-50">Cancel</button>
                    <button onClick={confirmSubscription} className="flex-1 py-5 bg-[#3C2A21] text-white rounded-2xl font-black text-xs uppercase shadow-xl transition-all hover:bg-black active:scale-95">Confirm Order</button>
                  </div>
               </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(createElement(App));
  </script>
</body>
</html>
